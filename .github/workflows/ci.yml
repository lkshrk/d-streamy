name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Select latest Xcode 16 (needs SDK >= 15.2 for SCContentFilter.includedWindows)
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_16*.app | sort -V | tail -1)"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install daemon dependencies
        run: bun install

      - name: Daemon tests (Bun)
        run: bun test

      - name: Type-check daemon
        run: bunx tsc --noEmit

      - name: Build & test (Swift)
        run: swift test
